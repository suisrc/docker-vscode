<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔐 登录</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --card-bg: rgba(255,255,255,0.04);
    --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 20px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.3);
    --input-bg: rgba(255,255,255,0.06);
    --grid-opacity: 0.03;
    --orb-opacity: 0.15;
    --radius: 16px;
    --toggle-bg: rgba(255,255,255,0.06);
    --toggle-border: rgba(255,255,255,0.1);
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  :root.light {
    --bg: #f4f4f8;
    --card-bg: rgba(255,255,255,0.7);
    --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.06), 0 20px 50px -12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
    --border: rgba(0,0,0,0.08);
    --text: #18181b;
    --text-dim: #71717a;
    --accent: #4f46e5;
    --accent-glow: rgba(99,102,241,0.2);
    --input-bg: rgba(0,0,0,0.04);
    --grid-opacity: 0.06;
    --orb-opacity: 0.08;
    --toggle-bg: rgba(0,0,0,0.04);
    --toggle-border: rgba(0,0,0,0.1);
  }

  @media (prefers-color-scheme: light) {
    :root:not(.dark) {
      --bg: #f4f4f8;
      --card-bg: rgba(255,255,255,0.7);
      --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.06), 0 20px 50px -12px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
      --border: rgba(0,0,0,0.08);
      --text: #18181b;
      --text-dim: #71717a;
      --accent: #4f46e5;
      --accent-glow: rgba(99,102,241,0.2);
      --input-bg: rgba(0,0,0,0.04);
      --grid-opacity: 0.06;
      --orb-opacity: 0.08;
      --toggle-bg: rgba(0,0,0,0.04);
      --toggle-border: rgba(0,0,0,0.1);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* animated gradient orb */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: var(--orb-opacity);
    pointer-events: none;
    animation: float 12s ease-in-out infinite;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    top: -15%; left: -10%;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: linear-gradient(135deg, #06b6d4, #6366f1);
    bottom: -20%; right: -10%;
    animation-delay: -4s;
  }
  .orb-3 {
    width: 350px; height: 350px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    top: 50%; left: 50%;
    animation-delay: -8s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(30px, -40px) scale(1.05); }
    66%      { transform: translate(-20px, 20px) scale(0.95); }
  }

  .card-wrap {
    position: relative;
    z-index: 1;
    perspective: 800px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px 40px;
    width: 480px;
    max-width: 90vw;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: var(--card-shadow);
  }

  .icon-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .icon-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .form-group {
    margin-bottom: 24px;
  }
  .label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap input {
    width: 100%;
    padding: 12px 16px;
    padding-right: 44px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    outline: none;
    transition: var(--transition);
  }
  .input-wrap input::placeholder {
    color: rgba(128,128,128,0.4);
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: rgba(255,255,255,0.08);
  }
  .input-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
    opacity: 0.4;
    transition: var(--transition);
  }
  .input-wrap input:focus ~ .input-icon {
    opacity: 0.8;
  }

  .btn {
    width: 100%;
    padding: 13px 24px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  .btn:hover {
    background: #4f46e5;
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }
  .btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .hint {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* subtle grid background */
  .grid-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: var(--grid-opacity);
    background-image:
      linear-gradient(rgba(128,128,128,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(128,128,128,0.5) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* theme toggle */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--toggle-border);
    background: var(--toggle-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    line-height: 1;
  }
  .theme-toggle:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">💻</button>

  <div class="card-wrap">
    <div class="card">
      <div class="icon-row">
        <div class="icon-circle">🔐</div>
      </div>
      <h1 class="title">登录</h1>
      <p class="subtitle">请输入您的访问令牌以继续</p>
      <form method="POST" action="/__login" autocomplete="off">
        <div class="form-group">
          <div class="input-wrap">
            <input
              id="token"
              name="token"
              type="password"
              placeholder="请输入访问令牌"
              autofocus
              autocomplete="off"
              spellcheck="false"
            >
            <!-- <span class="input-icon">🔑</span> -->
          </div>
        </div>
        <button class="btn" type="submit">验证并继续</button>
      </form>
      <p class="hint">令牌验证通过后将自动跳转到服务页面</p>
    </div>
  </div>
<script>
  (function() {
    const html = document.documentElement, btn = document.getElementById('themeToggle'), K = 'proxy-theme';
    const STATES = ['system', 'light', 'dark'];
    const ICONS = { system: '💻', light: '☀️', dark: '🌙' };

    function getSystem() { return matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }

    function getTheme() {
      const saved = localStorage.getItem(K);
      if (saved === 'light' || saved === 'dark') return saved;
      return 'system';
    }

    function applyTheme(t) {
      const effective = t === 'system' ? getSystem() : t;
      html.classList.remove('light', 'dark');
      if (effective === 'light') html.classList.add('light');
      else html.classList.add('dark');
      btn.textContent = ICONS[t] || ICONS.system;
      btn.title = ({ system: '跟随系统', light: '浅色模式', dark: '深色模式' })[t];
    }

    applyTheme(getTheme());

    btn.addEventListener('click', function() {
      var cur = getTheme(), idx = STATES.indexOf(cur), next = STATES[(idx + 1) % 3];
      localStorage.setItem(K, next === 'system' ? '' : next);
      applyTheme(next);
    });

    matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (getTheme() === 'system') applyTheme('system');
    });
  })();
</script>
</body>
</html>
