<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>已登出</title>
<style>
  :root {
    --bg: #0f0f13;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #6366f1;
    --toggle-bg: rgba(255,255,255,0.06);
    --toggle-border: rgba(255,255,255,0.1);
  }
  :root.light {
    --bg: #f4f4f8;
    --text: #18181b;
    --text-dim: #71717a;
    --accent: #4f46e5;
    --toggle-bg: rgba(0,0,0,0.04);
    --toggle-border: rgba(0,0,0,0.1);
  }
  @media (prefers-color-scheme: light) {
    :root:not(.dark) {
      --bg: #f4f4f8;
      --text: #18181b;
      --text-dim: #71717a;
      --accent: #4f46e5;
      --toggle-bg: rgba(0,0,0,0.04);
      --toggle-border: rgba(0,0,0,0.1);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; text-align: center;
    transition: background 0.3s, color 0.3s;
  }
  h1 { font-size: 28px; margin-bottom: 12px; }
  p { color: var(--text-dim); margin-bottom: 24px; }
  a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .theme-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--toggle-border); background: var(--toggle-bg);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.25s ease; line-height: 1;
  }
  .theme-toggle:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">💻</button>
<div>
  <h1>👋 已登出</h1>
  <p>令牌已清除，您可以关闭此页面。</p>
  <p><a href="/">返回首页</a></p>
</div>
<script>
  (function() {
    const html = document.documentElement, btn = document.getElementById('themeToggle'), K = 'proxy-theme';
    const STATES = ['system', 'light', 'dark'];
    const ICONS = { system: '💻', light: '☀️', dark: '🌙' };

    function getSystem() { return matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }

    function getTheme() {
      const saved = localStorage.getItem(K);
      if (saved === 'light' || saved === 'dark') return saved;
      return 'system';
    }

    function applyTheme(t) {
      const effective = t === 'system' ? getSystem() : t;
      html.classList.remove('light', 'dark');
      if (effective === 'light') html.classList.add('light');
      else html.classList.add('dark');
      btn.textContent = ICONS[t] || ICONS.system;
      btn.title = ({ system: '跟随系统', light: '浅色模式', dark: '深色模式' })[t];
    }

    applyTheme(getTheme());

    btn.addEventListener('click', function() {
      var cur = getTheme(), idx = STATES.indexOf(cur), next = STATES[(idx + 1) % 3];
      localStorage.setItem(K, next === 'system' ? '' : next);
      applyTheme(next);
    });

    matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (getTheme() === 'system') applyTheme('system');
    });
  })();
</script>
</body>
</html>
